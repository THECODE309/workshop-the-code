<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WORKSHOP | THE ORIGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Montserrat',sans-serif;
background:#050505;
}

body{

background:
linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.72)),
url("assets/workshop.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

.container{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:40px;

}

.chapter{

color:#B08D57;

font-size:13px;

letter-spacing:10px;

margin-bottom:25px;

opacity:0;

animation:fade .8s forwards;

}

h1{

color:#F2F0EA;

font-size:78px;

font-weight:700;

letter-spacing:12px;

margin-bottom:35px;

opacity:0;

animation:fade 1s .6s forwards;

}

.line{

width:120px;

height:2px;

background:#B08D57;

margin-bottom:45px;

opacity:0;

animation:fade 1s 1.2s forwards;

}

.text{

color:#d8d8d8;

font-size:23px;

font-weight:300;

line-height:2;

max-width:850px;

opacity:0;

animation:fade 1s 1.8s forwards;

}

.text p{

margin-bottom:22px;

}

.button{

margin-top:70px;

padding:18px 46px;

border:1px solid #B08D57;

text-decoration:none;

color:white;

letter-spacing:6px;

transition:.35s;

opacity:0;

animation:fade 1s 2.8s forwards;

}

.button:hover{

background:#B08D57;

color:#111;

transform:translateY(-3px);

}

.footer{

position:absolute;

bottom:30px;

color:#888;

font-size:11px;

letter-spacing:5px;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

h1{

font-size:44px;

letter-spacing:5px;

}

.text{

font-size:17px;

}

.button{

padding:16px 34px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="chapter">

CHAPTER I

</div>

<h1>

THE ORIGIN

</h1>

<div class="line"></div>

<div class="text">

<p>

Before a Code...

there was a purpose.

</p>

<p>

Before a garment...

there was a value.

</p>

<p>

Not everything deserves to become a Code.

Only principles that stand the test of time.

</p>

</div>

<a class="button" href="manifesto.html">

ENTER THE WORKSHOP

</a>

<div class="footer">

WORKSHOP · THE CODE

</div>

</div>

</body>

</html>
