<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE ORIGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

height:100%;
font-family:Montserrat,sans-serif;
background:#000;
overflow:hidden;

}

body{

background:url("assets/workshop.jpg") center center/cover no-repeat fixed;

}

.overlay{

position:absolute;

inset:0;

background:linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.60));

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:90%;

max-width:900px;

text-align:center;

color:#F2F0EA;

}

.small{

font-size:14px;

letter-spacing:10px;

color:#A67C38;

opacity:0;

animation:fade 2s forwards;

}

.title{

margin-top:25px;

font-size:74px;

font-weight:700;

letter-spacing:8px;

opacity:0;

animation:fade 2s .8s forwards;

}

.line{

margin:40px auto;

width:120px;

height:2px;

background:#A67C38;

opacity:0;

animation:fade 2s 1.5s forwards;

}

.text{

font-size:23px;

font-weight:300;

line-height:2;

max-width:780px;

margin:auto;

color:#DDDDDD;

opacity:0;

animation:fade 2s 2.2s forwards;

}

.text span{

display:block;

margin-bottom:12px;

}

.button{

display:inline-block;

margin-top:70px;

padding:18px 48px;

border:1px solid #A67C38;

text-decoration:none;

color:#F2F0EA;

letter-spacing:6px;

font-size:14px;

transition:.35s;

opacity:0;

animation:fade 2s 3.4s forwards;

}

.button:hover{

background:#A67C38;

color:#111;

}

.footer{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

font-size:11px;

letter-spacing:5px;

color:#777;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.title{

font-size:42px;

}

.text{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<div class="small">

CHAPTER I

</div>

<div class="title">

THE ORIGIN

</div>

<div class="line"></div>

<div class="text">

<span>Before a Code...</span>

<span>there was a purpose.</span>

<br>

<span>Before a garment...</span>

<span>there was a value.</span>

<br>

<span>Everything starts with character.</span>

</div>

<a href="manifesto.html" class="button">

ENTER THE WORKSHOP

</a>

</div>

<div class="footer">

WORKSHOP · THE CODE

</div>

</div>

</body>

</html>
