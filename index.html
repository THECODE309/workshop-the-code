<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WORKSHOP | THE CODE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#080808;
font-family:Montserrat,sans-serif;
color:white;
overflow:hidden;

}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
url('assets/background.jpg');

background-size:cover;

background-position:center;

}

.logo{

font-size:68px;

font-weight:700;

letter-spacing:18px;

opacity:0;

animation:fadeLogo 2s forwards;

}

.code{

margin-top:18px;

font-size:24px;

letter-spacing:10px;

font-weight:300;

color:#7A4B32;

opacity:0;

animation:fadeCode 2s .8s forwards;

}

.line{

margin-top:35px;

width:140px;

height:2px;

background:#7A4B32;

opacity:.7;

}

.subtitle{

margin-top:40px;

font-size:17px;

font-weight:300;

letter-spacing:3px;

color:#d8d8d8;

opacity:0;

animation:fadeSubtitle 2s 1.6s forwards;

}

.button{

margin-top:60px;

padding:18px 48px;

border:1px solid #7A4B32;

text-decoration:none;

color:white;

letter-spacing:4px;

font-size:14px;

transition:.35s;

opacity:0;

animation:fadeButton 2s 2.2s forwards;

}

.button:hover{

background:#7A4B32;

transform:translateY(-3px);

}

.footer{

position:absolute;

bottom:35px;

font-size:11px;

letter-spacing:3px;

opacity:.45;

}

@keyframes fadeLogo{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fadeCode{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fadeSubtitle{

from{

opacity:0;

}

to{

opacity:1;

}

}

@keyframes fadeButton{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.logo{

font-size:42px;

letter-spacing:8px;

}

.code{

font-size:18px;

letter-spacing:6px;

}

.subtitle{

padding:0 30px;

text-align:center;

font-size:15px;

}

.button{

padding:16px 32px;

}

}

</style>

</head>

<body>

<div class="hero">

<div class="logo">
WORKSHOP
</div>

<div class="code">
THE CODE
</div>

<div class="line"></div>

<div class="subtitle">

BUILT BY WORK.<br>

DEFINED BY VALUES.

</div>

<a class="button" href="manifesto.html">

ENTER THE CODE

</a>

<div class="footer">

© WORKSHOP • THE CODE

</div>

</div>

</body>

</html>
