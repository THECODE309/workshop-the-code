<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WORKSHOP | THE CODE</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
overflow:hidden;
font-family:Montserrat,sans-serif;

}

.hero{

position:relative;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

color:#F2F0EA;

}

/* textura muy sutil */

.hero:before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(circle at center,rgba(255,255,255,.03),transparent 70%),

linear-gradient(rgba(255,255,255,.015),rgba(255,255,255,.015));

opacity:.35;

}

/* camiseta */

.shirt{

position:absolute;

width:460px;

height:520px;

opacity:.045;

z-index:0;

}

.shirt svg{

width:100%;

height:100%;

}

.logo{

position:relative;

z-index:2;

font-size:82px;

font-weight:700;

letter-spacing:18px;

color:#F2F0EA;

animation:fade 2s;

}

.code{

position:relative;

z-index:2;

margin-top:15px;

font-size:28px;

letter-spacing:12px;

font-weight:300;

color:#7A4B32;

animation:fade 3s;

}

.tagline{

position:relative;

z-index:2;

margin-top:55px;

text-align:center;

line-height:2;

letter-spacing:5px;

font-size:16px;

font-weight:300;

}

.tagline span{

display:block;

}

.gold{

color:#B08D57;

}

.enter{

margin-top:70px;

position:relative;

z-index:2;

text-decoration:none;

color:#F2F0EA;

letter-spacing:8px;

font-size:15px;

transition:.4s;

}

.enter:hover{

color:#B08D57;

}

.arrow{

margin-top:18px;

font-size:24px;

animation:float 2s infinite;

}

.wmark{

position:absolute;

font-size:42vw;

font-weight:700;

color:white;

opacity:.018;

user-select:none;

z-index:1;

}

.footer{

position:absolute;

bottom:30px;

font-size:11px;

letter-spacing:4px;

color:#777;

}

@keyframes float{

0%{transform:translateY(0);}

50%{transform:translateY(8px);}

100%{transform:translateY(0);}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.logo{

font-size:48px;

letter-spacing:8px;

}

.code{

font-size:18px;

letter-spacing:5px;

}

.tagline{

font-size:13px;

padding:0 20px;

}

.shirt{

width:290px;

height:340px;

}

}

</style>

</head>

<body>

<div class="hero">

<div class="wmark">W</div>

<div class="shirt">

<svg viewBox="0 0 500 600">

<path
d="M160 60
L210 20
H290
L340 60
L420 120
L380 180
L330 150
V540
H170
V150
L120 180
L80 120
Z"

fill="none"

stroke="#ffffff"

stroke-width="2"/>

</svg>

</div>

<div class="logo">

WORKSHOP

</div>

<div class="code">

THE CODE

</div>

<div class="tagline">

<span>BUILT BY WORK.</span>

<span class="gold">DEFINED BY VALUES.</span>

</div>

<a class="enter" href="manifesto.html">

ENTER

<div class="arrow">

↓

</div>

</a>

<div class="footer">

© WORKSHOP · THE CODE

</div>

</div>

</body>

</html>
