<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE CODE | Manifesto</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0b0b0b;
font-family:Montserrat,sans-serif;
color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.container{

max-width:900px;

padding:60px;

text-align:center;

}

h1{

font-size:70px;

letter-spacing:10px;

margin-bottom:50px;

}

p{

font-size:21px;

line-height:1.9;

font-weight:300;

color:#d8d8d8;

margin-bottom:28px;

}

.button{

display:inline-block;

margin-top:60px;

padding:18px 50px;

border:1px solid #7A4B32;

color:white;

text-decoration:none;

letter-spacing:4px;

transition:.35s;

}

.button:hover{

background:#7A4B32;

}

@media(max-width:768px){

.container{

padding:35px;

}

h1{

font-size:42px;

}

p{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>THE CODE</h1>

<p>

We were not born to follow trends.

</p>

<p>

We believe that work builds character.

Sacrifice creates opportunity.

Respect earns trust.

Discipline shapes the future.

</p>

<p>

Every garment tells a story.

Every Code represents a value.

</p>

<p>

This is identity.

</p>
